name: CD — Déploiement Render

on:
  push:
    branches: [main]        # uniquement sur main (après merge)

jobs:
  deploy:
    name: Déployer sur Render
    runs-on: ubuntu-latest
    needs: []               # indépendant du CI (on peut ajouter needs: [lint-and-check] si souhaité)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Déclenche le Deploy Hook Render via une requête HTTP
      # RENDER_DEPLOY_HOOK_URL doit être ajouté dans :
      # GitHub → Settings → Secrets and variables → Actions → New repository secret
      - name: Déployer sur Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | grep -qE '^(200|201|202)' \
            && echo "✅ Déploiement déclenché" \
            || (echo "❌ Échec du déploiement" && exit 1)

      - name: Résumé
        run: |
          echo "## 🚀 Déploiement" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Déclenché le: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
