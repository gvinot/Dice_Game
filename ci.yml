name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Tests & vérification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification syntaxe Node
        run: node --check server.js src/**/*.js

      - name: ESLint
        run: npm run lint

      - name: Tests unitaires et intégration
        run: npm test

      - name: Rapport de couverture
        run: npm run test:coverage
        continue-on-error: true   # ne bloque pas le CI si la couverture est basse

      - name: Smoke test démarrage serveur
        run: |
          timeout 5 node server.js &
          sleep 3
          kill %1 2>/dev/null || true
          echo "✅ Serveur démarre correctement"
